<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grovix Studio - Loading</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: opacity 0.3s ease;
    }

    .loading-container {
      text-align: center;
      position: relative;
    }

    .logo {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: 3px;
      margin-bottom: 60px;
      animation: fadeIn 1s ease, float 3s ease-in-out infinite;
    }

    .logo span {
      background: linear-gradient(135deg, #00d9ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-bar {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d9ff, #a855f7);
      width: 0%;
      animation: loading 2.5s ease-in-out forwards;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
    }

    .loading-text {
      margin-top: 30px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #00d9ff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes loading {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      animation: orbFloat 4s ease-in-out infinite;
    }

    .orb1 {
      width: 200px;
      height: 200px;
      background: rgba(0, 217, 255, 0.3);
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .orb2 {
      width: 150px;
      height: 150px;
      background: rgba(168, 85, 247, 0.3);
      bottom: 20%;
      right: 15%;
      animation-delay: 1s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  
  <div class="loading-container">
    <div class="logo">
      GROVIX <span>STUDIO</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="loading-text">Loading Experience...</div>
  </div>

  <script>
    // Create stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }

    // Animate progress bar and text
    const progressFill = document.querySelector('.progress-fill');
    const loadingText = document.querySelector('.loading-text');
    const logo = document.querySelector('.logo');
    
    const messages = [
      'Loading Experience...',
      'Initializing Systems...',
      'Preparing Interface...',
      'Almost Ready...'
    ];
    
    let messageIndex = 0;
    const messageInterval = setInterval(() => {
      messageIndex++;
      if (messageIndex < messages.length) {
        loadingText.textContent = messages[messageIndex];
      }
    }, 700);

    // Redirect after loading
    setTimeout(() => {
      clearInterval(messageInterval);
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 300);
    }, 3000);
  </script>
</body>
</html>
